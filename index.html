<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬打譜軟體 V2.0 - 互動發聲版</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            margin: 0; display: flex; height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1e1e1e; color: #ffffff;
            user-select: none;
        }
        #sidebar {
            width: 280px; background-color: #252526;
            border-right: 1px solid #3e3e42; padding: 20px;
            overflow-y: auto;
        }
        #sidebar h2 { color: #4daafc; font-size: 20px; margin-top: 0; }
        .track-info {
            background: #333; padding: 10px; border-radius: 6px;
            margin-bottom: 20px; border-left: 4px solid #4daafc;
        }
        .tool-group { margin-bottom: 20px; }
        .tool-group p { margin: 0 0 10px 0; color: #aaa; font-size: 14px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tool-btn {
            background-color: #3e3e42; color: white; border: none;
            padding: 10px; border-radius: 4px; cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }
        .tool-btn:hover { background-color: #555; }
        .tool-btn.active { background-color: #4daafc; font-weight: bold; }
        .action-btn {
            background-color: #d1a827; color: #1e1e1e; border: none;
            padding: 12px; width: 100%; border-radius: 4px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        .action-btn:hover { background-color: #e3b836; }
        
        #main-area { flex: 1; display: flex; flex-direction: column; }
        #toolbar {
            height: 60px; background-color: #333333;
            border-bottom: 1px solid #3e3e42; display: flex;
            align-items: center; padding: 0 20px; gap: 15px;
        }
        .top-btn {
            background-color: #4daafc; color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .top-btn.play { background-color: #4caf50; }
        .top-btn.clear { background-color: #e53935; }

        #workspace {
            flex: 1; padding: 40px; overflow: auto;
            display: flex; justify-content: center; align-items: flex-start;
        }
        #score-container {
            background-color: white; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🎵 專屬打譜軟體</h2>
        
        <div class="track-info">
            <strong>目前音軌：Euphonium</strong><br>
            <span style="font-size: 12px; color: #aaa;">模式：單一行譜 (分譜編輯)</span>
        </div>

        <div class="tool-group">
            <p>1. 選擇音符長度</p>
            <div class="btn-grid" id="duration-btns">
                <button class="tool-btn" data-val="h">二分音符</button>
                <button class="tool-btn active" data-val="q">四分音符</button>
                <button class="tool-btn" data-val="8">八分音符</button>
            </div>
        </div>

        <div class="tool-group">
            <p>2. 選擇音高 (低音譜號)</p>
            <div class="btn-grid" id="pitch-btns">
                <button class="tool-btn" data-val="f/2">F2</button>
                <button class="tool-btn" data-val="g/2">G2</button>
                <button class="tool-btn" data-val="a/2">A2</button>
                <button class="tool-btn active" data-val="bb/2">Bb2</button>
                <button class="tool-btn" data-val="c/3">C3</button>
                <button class="tool-btn" data-val="d/3">D3</button>
                <button class="tool-btn" data-val="eb/3">Eb3</button>
                <button class="tool-btn" data-val="f/3">F3</button>
            </div>
        </div>

        <button class="action-btn" onclick="addNote()">➕ 新增音符至樂譜</button>
        
        <div style="margin-top: 30px; border-top: 1px solid #444; padding-top: 20px;">
            <p style="color: #aaa; font-size: 14px; margin-bottom: 10px;">總譜控制 (開發中)</p>
            <button class="tool-btn" style="width: 100%;">切換指揮總譜模式</button>
        </div>
    </div>

    <div id="main-area">
        <div id="toolbar">
            <button class="top-btn clear" onclick="clearScore()">🗑 清空樂譜</button>
            <div style="flex:1;"></div>
            <button class="top-btn play" onclick="playScore()">▶ 播放樂譜</button>
        </div>

        <div id="workspace">
            <div id="score-container"></div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

        // 系統狀態變數
        let currentDuration = "q";
        let currentPitch = "bb/2";
        
        // 預設給兩個音符當作起手式
        let scoreData = [
            { pitch: "bb/2", duration: "q" },
            { pitch: "c/3", duration: "q" }
        ];

        // UI 按鈕綁定邏輯
        document.querySelectorAll('#duration-btns .tool-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('#duration-btns .tool-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDuration = e.target.dataset.val;
            };
        });

        document.querySelectorAll('#pitch-btns .tool-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('#pitch-btns .tool-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentPitch = e.target.dataset.val;
            };
        });

        // 核心渲染函數：把 scoreData 陣列轉換成 VexFlow 樂譜
        function renderScore() {
            const container = document.getElementById("score-container");
            container.innerHTML = ""; // 清空舊畫布

            if (scoreData.length === 0) return;

            const renderer = new Renderer(container, Renderer.Backends.SVG);
            // 動態計算畫布寬度
            renderer.resize(Math.max(400, scoreData.length * 80 + 100), 200);
            const context = renderer.getContext();

            const stave = new Stave(10, 40, Math.max(300, scoreData.length * 80));
            stave.addClef("bass").addTimeSignature("4/4");
            stave.setContext(context).draw();

            // 根據資料陣列生成音符
            const notes = scoreData.map(data => {
                // 處理降記號邏輯 (如果音高包含 b)
                let keys = [data.pitch.replace('b/', '/')]; // VexFlow 讀音高不要 b
                let note = new StaveNote({ keys: keys, duration: data.duration, clef: "bass" });
                if (data.pitch.includes('b')) {
                    note.addModifier(new Accidental("b"));
                }
                return note;
            });

            // 計算總拍數以建立 Voice
            let totalTicks = notes.reduce((sum, note) => sum + note.getTicks().value(), 0);
            // VexFlow 預設 1拍 = 4096 ticks
            let beats = Math.ceil(totalTicks / 4096); 
            
            const voice = new Voice({ num_beats: beats, beat_value: 4 });
            voice.setStrict(false); // 允許拍數不滿一個小節
            voice.addTickables(notes);

            new Formatter().joinVoices([voice]).format([voice], Math.max(250, scoreData.length * 70));
            voice.draw(context, stave);
        }

        // 新增音符
        function addNote() {
            scoreData.push({ pitch: currentPitch, duration: currentDuration });
            renderScore();
        }

        // 清空樂譜
        function clearScore() {
            scoreData = [];
            document.getElementById("score-container").innerHTML = "";
        }

        // Tone.js 播放邏輯
        async function playScore() {
            await Tone.start(); // 啟動瀏覽器音訊引擎
            const synth = new Tone.Synth().toDestination();
            
            let now = Tone.now();
            scoreData.forEach(data => {
                // 將 VexFlow 的時值轉換為 Tone.js 能懂的時值
                let toneDuration = data.duration === 'h' ? '2n' : (data.duration === 'q' ? '4n' : '8n');
                // 將 VexFlow 音高 (bb/2) 轉換為標準音名 (Bb2)
                let tonePitch = data.pitch.replace('/', '').toUpperCase();
                // 修正降記號大小寫 (Bb2)
                if(tonePitch.includes('B') && tonePitch.length === 3) {
                    tonePitch = tonePitch[0] + 'b' + tonePitch[2];
                }

                synth.triggerAttackRelease(tonePitch, toneDuration, now);
                
                // 計算下一個音符的起始時間
                let addTime = data.duration === 'h' ? 1 : (data.duration === 'q' ? 0.5 : 0.25);
                now += addTime;
            });
        }

        // 初始渲染
        renderScore();
    </script>

</body>
</html>
