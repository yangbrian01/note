<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬打譜軟體 - 專業渲染版</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            padding-top: 50px;
            margin: 0;
        }
        #score-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            /* 讓 SVG 樂譜可以漂亮地顯示 */
            overflow: auto; 
        }
    </style>
</head>
<body>

    <h1>專屬打譜軟體</h1>
    
    <div id="score-container"></div>

    <script>
        // 提取 VexFlow 的核心模組
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

        // 1. 初始化畫布 (使用 SVG 格式，放大縮小都不會失真)
        const div = document.getElementById("score-container");
        const renderer = new Renderer(div, Renderer.Backends.SVG);
        renderer.resize(700, 200);
        const context = renderer.getContext();

        // 2. 建立五線譜 (設定 X, Y 座標與寬度)
        const stave = new Stave(10, 40, 600);
        
        // 加上你熟悉的低音譜記號與 4/4 拍號
        stave.addClef("bass").addTimeSignature("4/4");
        stave.setContext(context).draw();

        // 3. 建立音符陣列
        // 這裡幫你配了四個四分音符 (q)，剛好填滿 4/4 拍
        const notes = [
            new StaveNote({ keys: ["g/2"], duration: "q", clef: "bass" }), // G2
            // 你的降 B 音 (Bb2) 在這裡！
            new StaveNote({ keys: ["b/2"], duration: "q", clef: "bass" })  
                .addModifier(new Accidental("b")), 
            new StaveNote({ keys: ["c/3"], duration: "q", clef: "bass" }), // C3
            new StaveNote({ keys: ["d/3"], duration: "q", clef: "bass" }), // D3
        ];

        // 4. 建立聲部 (Voice) 並確保節拍正確
        const voice = new Voice({ num_beats: 4, beat_value: 4 });
        voice.addTickables(notes);

        // 5. 自動排版與渲染 (Formatter 會自動計算最完美的音符間距)
        new Formatter().joinVoices([voice]).format([voice], 500);
        voice.draw(context, stave);
    </script>

</body>
</html>
