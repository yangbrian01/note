<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yang Tech 編譜引擎 V4.0 - 直覺輸入版</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            margin: 0; display: flex; flex-direction: column; height: 100vh;
            font-family: 'Segoe UI', sans-serif; background-color: #1e1e1e; color: #fff;
            user-select: none;
        }
        /* 頂部工具列 (MuseScore 風格) */
        #toolbar {
            height: 60px; background-color: #252526; border-bottom: 1px solid #3e3e42;
            display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0;
        }
        .tool-sep { width: 1px; height: 30px; background-color: #555; margin: 0 10px; }
        .tool-btn {
            background-color: transparent; color: #ccc; border: 1px solid transparent;
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        .tool-btn:hover { background-color: #333; }
        .tool-btn.active { background-color: #4daafc; color: #fff; font-weight: bold; }
        .tool-btn.toggle-active { background-color: #d1a827; color: #000; font-weight: bold; }
        
        .action-btn {
            background-color: #4caf50; color: white; border: none; font-weight: bold;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-left: auto;
        }
        .action-btn.danger { background-color: #e53935; margin-left: 10px; }

        /* 工作區與畫布 */
        #workspace {
            flex: 1; padding: 40px; overflow: auto; background-color: #2d2d30;
            display: flex; align-items: flex-start; justify-content: flex-start;
            cursor: crosshair; /* 游標改成十字星，方便對準線間 */
        }
        #score-container {
            background-color: white; padding: 20px 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px;
            min-height: 200px; display: inline-block;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <span style="color:#4daafc; font-weight:bold; margin-right: 20px;">🎵 Yang Tech V4</span>
        
        <button class="tool-btn" data-type="duration" data-val="16">♪ 16分 (3)</button>
        <button class="tool-btn" data-type="duration" data-val="8">♪ 8分 (4)</button>
        <button class="tool-btn active" data-type="duration" data-val="q">♩ 4分 (5)</button>
        <button class="tool-btn" data-type="duration" data-val="h">𝅗𝅥 2分 (6)</button>
        
        <div class="tool-sep"></div>
        
        <button class="tool-btn" id="btn-rest">𝄽 休止符 (0)</button>
        <button class="tool-btn" id="btn-dot">. 附點</button>

        <div class="tool-sep"></div>

        <button class="tool-btn active" data-type="accidental" data-val="">無</button>
        <button class="tool-btn" data-type="accidental" data-val="b">♭ 降</button>
        <button class="tool-btn" data-type="accidental" data-val="#">♯ 升</button>
        <button class="tool-btn" data-type="accidental" data-val="n">♮ 還原</button>

        <button class="action-btn" onclick="playScore()">▶ 播放樂譜</button>
        <button class="action-btn danger" onclick="undoNote()">↶ 復原上一筆</button>
    </div>

    <div id="workspace">
        <div id="score-container"></div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental, Dot } = Vex.Flow;

        let currentDuration = "q";
        let currentAccidental = "";
        let isRest = false;
        let isDotted = false;
        const beatValues = { "w": 4, "h": 2, "q": 1, "8": 0.5, "16": 0.25 };
        let scoreData = [];

        // --- UI 按鈕綁定 ---
        document.querySelectorAll('[data-type="duration"]').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('[data-type="duration"]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDuration = e.target.dataset.val;
            };
        });

        document.querySelectorAll('[data-type="accidental"]').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('[data-type="accidental"]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentAccidental = e.target.dataset.val;
            };
        });

        document.getElementById('btn-rest').onclick = (e) => {
            isRest = !isRest;
            e.target.classList.toggle('toggle-active');
        };

        document.getElementById('btn-dot').onclick = (e) => {
            isDotted = !isDotted;
            e.target.classList.toggle('toggle-active');
        };

        // --- 鍵盤快捷鍵 (MuseScore 邏輯) ---
        window.addEventListener('keydown', (e) => {
            const keyMap = {
                '3': '16', '4': '8', '5': 'q', '6': 'h'
            };
            if (keyMap[e.key]) {
                document.querySelector(`[data-val="${keyMap[e.key]}"]`).click();
            } else if (e.key === '0') {
                document.getElementById('btn-rest').click();
            }
        });

        // --- 核心：滑鼠 Y 軸轉換音高演算法 (Bass Clef) ---
        // VexFlow 預設五線譜的 Y 座標基底。我們建立一個陣列，將 Y 軸的偏移量對應到具體的音高。
        const pitchMap = [
            { y: -30, pitch: "f/4" }, { y: -25, pitch: "e/4" }, { y: -20, pitch: "d/4" }, { y: -15, pitch: "c/4" },
            { y: -10, pitch: "b/3" }, { y: -5, pitch: "a/3" },  { y: 0, pitch: "g/3" },   { y: 5, pitch: "f/3" },
            { y: 10, pitch: "e/3" },  { y: 15, pitch: "d/3" },  { y: 20, pitch: "c/3" },  { y: 25, pitch: "b/2" },
            { y: 30, pitch: "a/2" },  { y: 35, pitch: "g/2" },  { y: 40, pitch: "f/2" },  { y: 45, pitch: "e/2" },
            { y: 50, pitch: "d/2" },  { y: 55, pitch: "c/2" },  { y: 60, pitch: "b/1" }
        ];

        document.getElementById('score-container').addEventListener('mousedown', function(e) {
            // 取得畫布相對於視窗的位置
            const rect = this.getBoundingClientRect();
            // 計算滑鼠點擊的相對 Y 座標 (減去一點 padding 的誤差值)
            const clickY = e.clientY - rect.top - 80; 

            // 尋找最接近滑鼠 Y 座標的音高
            let closestPitch = "b/2"; // 預設值
            let minDiff = Infinity;

            for (let p of pitchMap) {
                let diff = Math.abs(clickY - p.y);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestPitch = p.pitch;
                }
            }

            let beats = beatValues[currentDuration];
            if (isDotted) beats *= 1.5;

            // 將音符寫入陣列並重新渲染
            scoreData.push({
                pitch: closestPitch,
                duration: currentDuration,
                accidental: currentAccidental,
                isRest: isRest,
                isDotted: isDotted,
                beats: beats
            });
            renderScore();
        });

        function undoNote() {
            scoreData.pop();
            renderScore();
        }

        // --- 渲染與自動小節線邏輯 (同 V3，但優化了畫布處理) ---
        function renderScore() {
            const container = document.getElementById("score-container");
            container.innerHTML = ""; 
            
            // 就算沒音符，也畫一個空的五線譜與譜號
            if (scoreData.length === 0) {
                const renderer = new Renderer(container, Renderer.Backends.SVG);
                renderer.resize(250, 150);
                const ctx = renderer.getContext();
                const stave = new Stave(0, 40, 200).addClef("bass").addTimeSignature("4/4");
                stave.setContext(ctx).draw();
                return;
            }

            let measures = [];
            let currentMeasure = [];
            let currentBeats = 0;

            scoreData.forEach(data => {
                if (currentBeats + data.beats > 4) {
                    measures.push(currentMeasure);
                    currentMeasure = [];
                    currentBeats = 0;
                }
                currentMeasure.push(data);
                currentBeats += data.beats;
            });
            if (currentMeasure.length > 0) measures.push(currentMeasure);

            const totalWidth = measures.length * 200 + 100;
            const renderer = new Renderer(container, Renderer.Backends.SVG);
            renderer.resize(totalWidth, 150);
            const context = renderer.getContext();

            let startX = 0;
            measures.forEach((measureNotes, index) => {
                let staveWidth = index === 0 ? 250 : 200; 
                const stave = new Stave(startX, 40, staveWidth);
                if (index === 0) stave.addClef("bass").addTimeSignature("4/4");
                stave.setContext(context).draw();

                let vexNotes = measureNotes.map(data => {
                    let keys = data.isRest ? ["d/3"] : [data.pitch];
                    let duration = data.duration + (data.isRest ? "r" : "");
                    let note = new StaveNote({ keys: keys, duration: duration, clef: "bass" });
                    
                    if (data.isDotted) note.addModifier(new Dot());
                    if (!data.isRest && data.accidental) note.addModifier(new Accidental(data.accidental));
                    return note;
                });

                let voiceBeats = measureNotes.reduce((sum, n) => sum + n.beats, 0);
                const voice = new Voice({ num_beats: Math.ceil(voiceBeats), beat_value: 4 });
                voice.setStrict(false);
                voice.addTickables(vexNotes);

                new Formatter().joinVoices([voice]).format([voice], staveWidth - 50);
                voice.draw(context, stave);
                startX += staveWidth;
            });
        }

        // --- 播放邏輯 ---
        async function playScore() {
            if (scoreData.length === 0) return;
            await Tone.start();
            const synth = new Tone.Synth().toDestination();
            let now = Tone.now();
            
            scoreData.forEach(data => {
                let toneDur = data.duration + "n";
                if (data.duration === "w") toneDur = "1n";
                let durationSeconds = Tone.Time(toneDur).toSeconds();
                if (data.isDotted) durationSeconds *= 1.5;

                if (!data.isRest) {
                    let noteName = data.pitch.replace('/', '').toUpperCase();
                    if (data.accidental === 'b') noteName = noteName.charAt(0) + 'b' + noteName.slice(1);
                    if (data.accidental === '#') noteName = noteName.charAt(0) + '#' + noteName.slice(1);
                    synth.triggerAttackRelease(noteName, durationSeconds, now);
                }
                now += durationSeconds;
            });
        }

        renderScore();
    </script>
</body>
</html>
