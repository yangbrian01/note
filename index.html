<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yang Tech 編譜引擎 V3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            margin: 0; display: flex; height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1e1e1e; color: #ffffff; user-select: none;
        }
        #sidebar {
            width: 320px; background-color: #252526;
            border-right: 1px solid #3e3e42; padding: 20px; overflow-y: auto;
        }
        #sidebar h2 { color: #4daafc; font-size: 20px; margin-top: 0; }
        .tool-group { margin-bottom: 20px; background: #333; padding: 15px; border-radius: 8px; }
        .tool-group p { margin: 0 0 10px 0; color: #ccc; font-size: 14px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; }
        .tool-btn {
            background-color: #444; color: white; border: 1px solid #555;
            padding: 8px; border-radius: 4px; cursor: pointer; transition: 0.1s; font-size: 14px;
        }
        .tool-btn:hover { background-color: #555; }
        .tool-btn.active { background-color: #4daafc; border-color: #4daafc; font-weight: bold; }
        .tool-btn.toggle-active { background-color: #d1a827; color: #000; border-color: #d1a827; font-weight: bold; }
        
        .action-btn {
            background-color: #4caf50; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 4px; font-weight: bold;
            cursor: pointer; margin-top: 10px; font-size: 16px;
        }
        .action-btn:hover { background-color: #45a049; }
        
        #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #toolbar {
            height: 60px; background-color: #333333; border-bottom: 1px solid #3e3e42;
            display: flex; align-items: center; padding: 0 20px; gap: 15px; flex-shrink: 0;
        }
        .top-btn {
            background-color: #555; color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .top-btn.play { background-color: #4daafc; }
        .top-btn.clear { background-color: #e53935; }

        #workspace {
            flex: 1; padding: 40px; overflow: auto;
            background-color: #2d2d30;
            display: flex; align-items: flex-start;
        }
        #score-container {
            background-color: white; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 4px;
            min-height: 150px; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🎵 Yang Tech 編譜引擎</h2>

        <div class="tool-group">
            <p>1. 音符時值與修飾</p>
            <div class="btn-grid" id="duration-btns">
                <button class="tool-btn" data-val="w">全音</button>
                <button class="tool-btn" data-val="h">二分</button>
                <button class="tool-btn active" data-val="q">四分</button>
                <button class="tool-btn" data-val="8">八分</button>
                <button class="tool-btn" data-val="16">十六分</button>
            </div>
            <div class="btn-grid" style="margin-top: 8px;">
                <button class="tool-btn" id="btn-dot">附點 (.)</button>
                <button class="tool-btn" id="btn-rest">休止符 (Rest)</button>
            </div>
        </div>

        <div class="tool-group">
            <p>2. 臨時記號</p>
            <div class="btn-grid" id="accidental-btns">
                <button class="tool-btn active" data-val="">無</button>
                <button class="tool-btn" data-val="b">降 (b)</button>
                <button class="tool-btn" data-val="#">升 (#)</button>
                <button class="tool-btn" data-val="n">還原 (n)</button>
            </div>
        </div>

        <div class="tool-group" id="pitch-group">
            <p>3. 音高選擇 (Bass Clef)</p>
            <div class="btn-grid" id="pitch-btns">
                <button class="tool-btn" data-val="f/2">F2</button>
                <button class="tool-btn" data-val="g/2">G2</button>
                <button class="tool-btn" data-val="a/2">A2</button>
                <button class="tool-btn active" data-val="b/2">B2</button>
                <button class="tool-btn" data-val="c/3">C3</button>
                <button class="tool-btn" data-val="d/3">D3</button>
                <button class="tool-btn" data-val="e/3">E3</button>
                <button class="tool-btn" data-val="f/3">F3</button>
            </div>
        </div>

        <button class="action-btn" onclick="addNote()">➕ 寫入樂譜</button>
    </div>

    <div id="main-area">
        <div id="toolbar">
            <button class="top-btn clear" onclick="clearScore()">🗑 清空</button>
            <button class="top-btn" onclick="undoNote()">↶ 復原 (Undo)</button>
            <div style="flex:1;"></div>
            <button class="top-btn play" onclick="playScore()">▶ 播放 (Tone.js)</button>
        </div>
        <div id="workspace">
            <div id="score-container"></div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental, Dot } = Vex.Flow;

        // 系統狀態
        let currentDuration = "q";
        let currentPitch = "b/2";
        let currentAccidental = "";
        let isRest = false;
        let isDotted = false;
        
        // 時值對應的拍數 (4/4拍為基準)
        const beatValues = { "w": 4, "h": 2, "q": 1, "8": 0.5, "16": 0.25 };
        
        // 樂譜資料庫
        let scoreData = [];

        // --- UI 事件綁定 ---
        function setupButtons(selector, callback) {
            document.querySelectorAll(selector).forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll(selector).forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    callback(e.target.dataset.val);
                };
            });
        }

        setupButtons('#duration-btns .tool-btn', val => currentDuration = val);
        setupButtons('#accidental-btns .tool-btn', val => currentAccidental = val);
        setupButtons('#pitch-btns .tool-btn', val => currentPitch = val);

        document.getElementById('btn-rest').onclick = (e) => {
            isRest = !isRest;
            e.target.classList.toggle('toggle-active');
            document.getElementById('pitch-group').style.opacity = isRest ? '0.3' : '1';
        };

        document.getElementById('btn-dot').onclick = (e) => {
            isDotted = !isDotted;
            e.target.classList.toggle('toggle-active');
        };

        // --- 核心邏輯：新增音符 ---
        function addNote() {
            let beats = beatValues[currentDuration];
            if (isDotted) beats *= 1.5;

            scoreData.push({
                pitch: currentPitch,
                duration: currentDuration,
                accidental: currentAccidental,
                isRest: isRest,
                isDotted: isDotted,
                beats: beats
            });
            renderScore();
        }

        function undoNote() {
            scoreData.pop();
            renderScore();
        }

        function clearScore() {
            scoreData = [];
            renderScore();
        }

        // --- VexFlow 渲染邏輯 (自動小節線分割) ---
        function renderScore() {
            const container = document.getElementById("score-container");
            container.innerHTML = ""; 
            if (scoreData.length === 0) return;

            // 1. 將資料分組為「小節」(Measures)
            let measures = [];
            let currentMeasure = [];
            let currentBeats = 0;

            scoreData.forEach(data => {
                if (currentBeats + data.beats > 4) {
                    measures.push(currentMeasure);
                    currentMeasure = [];
                    currentBeats = 0;
                }
                currentMeasure.push(data);
                currentBeats += data.beats;
            });
            if (currentMeasure.length > 0) measures.push(currentMeasure);

            // 2. 初始化畫布 (動態寬度)
            const totalWidth = measures.length * 250 + 100;
            const renderer = new Renderer(container, Renderer.Backends.SVG);
            renderer.resize(totalWidth, 200);
            const context = renderer.getContext();

            // 3. 逐一繪製小節
            let startX = 10;
            measures.forEach((measureNotes, index) => {
                let staveWidth = index === 0 ? 250 : 200; // 第一小節預留譜號空間
                const stave = new Stave(startX, 40, staveWidth);
                
                if (index === 0) {
                    stave.addClef("bass").addTimeSignature("4/4");
                }
                stave.setContext(context).draw();

                // 建立 VexFlow 音符
                let vexNotes = measureNotes.map(data => {
                    let keys = data.isRest ? ["d/3"] : [data.pitch];
                    let duration = data.duration + (data.isRest ? "r" : "");
                    
                    let note = new StaveNote({ keys: keys, duration: duration, clef: "bass" });
                    
                    if (data.isDotted) note.addModifier(new Dot());
                    if (!data.isRest && data.accidental) {
                        note.addModifier(new Accidental(data.accidental));
                    }
                    return note;
                });

                // 排版並繪製此小節
                let voiceBeats = measureNotes.reduce((sum, n) => sum + n.beats, 0);
                // 允許不滿 4 拍的小節也能畫出來
                const voice = new Voice({ num_beats: Math.ceil(voiceBeats), beat_value: 4 });
                voice.setStrict(false);
                voice.addTickables(vexNotes);

                new Formatter().joinVoices([voice]).format([voice], staveWidth - 40);
                voice.draw(context, stave);

                startX += staveWidth;
            });
        }

        // --- Tone.js 播放邏輯 ---
        async function playScore() {
            if (scoreData.length === 0) return;
            await Tone.start();
            const synth = new Tone.Synth().toDestination();
            
            let now = Tone.now();
            scoreData.forEach(data => {
                let toneDur = data.duration + "n";
                if (data.duration === "w") toneDur = "1n";
                let durationSeconds = Tone.Time(toneDur).toSeconds();
                if (data.isDotted) durationSeconds *= 1.5;

                if (!data.isRest) {
                    // 將 b/2, acc: 'b' 轉成 Bb2
                    let noteName = data.pitch.replace('/', '').toUpperCase();
                    if (data.accidental === 'b') noteName = noteName.charAt(0) + 'b' + noteName.slice(1);
                    if (data.accidental === '#') noteName = noteName.charAt(0) + '#' + noteName.slice(1);
                    
                    synth.triggerAttackRelease(noteName, durationSeconds, now);
                }
                now += durationSeconds;
            });
        }

        renderScore();
    </script>
</body>
</html>
