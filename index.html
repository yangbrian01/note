<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬打譜軟體 - 測試版</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        h1 {
            position: absolute;
            top: 20px;
            color: #333;
        }
        #scoreCanvas {
            background-color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <h1>專屬打譜軟體</h1>
    
    <canvas id="scoreCanvas" width="800" height="300"></canvas>

    <script>
        const canvas = document.getElementById('scoreCanvas');
        const ctx = canvas.getContext('2d');
        
        // 將五線譜的間距與起始位置設為全域變數，方便所有函數共用
        const staffSpacing = 12;
        const startY = (canvas.height / 2) - (staffSpacing * 2);

        // 1. 畫五線譜
        function drawStaff() {
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.2;

            for (let i = 0; i < 5; i++) {
                const y = startY + (i * staffSpacing);
                ctx.beginPath();
                ctx.moveTo(40, y);
                ctx.lineTo(canvas.width - 40, y);
                ctx.stroke();
            }
        }

        // 2. 畫低音譜記號 (Bass Clef)
        function drawBassClef() {
            ctx.fillStyle = 'black';
            ctx.font = '48px "Noto Music", sans-serif';
            
            // 𝄢 是低音譜記號的 Unicode 符號
            // Y 軸座標需要經過微調，讓譜號的兩個點剛好夾住第四線 (F線)
            ctx.fillText('𝄢', 45, startY + (staffSpacing * 3.6));
        }

        // 3. 畫音符與降記號
        function drawNote() {
            ctx.fillStyle = 'black';
            ctx.font = '40px "Noto Music", sans-serif';
            
            // 找出五線譜第二線 (B線) 的 Y 座標
            const noteY = startY + (staffSpacing * 1.5);
            
            // 畫降記號 (♭)
            ctx.fillText('♭', 120, noteY + 5); 
            // 畫四分音符 (♩)
            ctx.fillText('♩', 140, noteY); 
        }

        // 重要：必須等音樂字體從 Google 伺服器載入完成後，再開始畫圖
        // 否則瀏覽器會來不及渲染，導致音符變成奇怪的方塊亂碼
        document.fonts.ready.then(() => {
            // 每次畫圖前先清空畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            drawStaff();
            drawBassClef();
            drawNote();
        });
    </script>

</body>
</html>
